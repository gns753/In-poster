name: Generate LinkedIn draft

on:
  schedule:
    # 05:00 UTC = 09:00 Baku vaxtı (UTC+4). İstəsən dəyiş.
    - cron: "0 5 * * *"
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Asılılıqları quraşdır
        run: pip install -r requirements.txt

      - name: Draft yarat (xəbər + AI mətn + AI şəkil)
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python scripts/generate_draft.py

      - name: pending/ qovluğunu commit et
        id: commit
        run: |
          git config user.name "linkedin-ai-poster-bot"
          git config user.email "actions@users.noreply.github.com"
          git add pending/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Yeni LinkedIn draft-ı"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Təsdiq üçün issue aç
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(date -u +'%Y-%m-%d')
          gh issue create \
            --title "LinkedIn draft - ${TODAY}" \
            --body-file "pending/issue_body.md" \
            --label "pending-approval"
